<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Boardmap Sign In</title>
    <link rel="stylesheet" href="developer.css">
  </head>
  <body>
    <header class="dev-header">
      <div><p class="eyebrow">Boardmap / Supabase Auth</p><h1>Member Sign In</h1><p>플레이 기록을 저장할 Boardmap 멤버 계정을 연결합니다.</p></div>
      <a class="back-link" href="index.html">Back to Boardmap</a>
    </header>
    <main>
      <section class="notice" id="configNotice" role="status"></section>
      <section>
        <div class="section-heading"><div><p class="eyebrow">Account</p><h2 id="authTitle">Sign in or sign up</h2></div></div>
        <form class="member-editor" id="authForm">
          <label>Display name<input id="displayName" autocomplete="name" placeholder="가입할 때 사용"></label>
          <label>Email<input id="email" type="email" autocomplete="email" required></label>
          <label>Password<input id="password" type="password" autocomplete="current-password" minlength="6" required></label>
          <div class="editor-actions"><button type="submit">Sign in</button><button type="button" id="signUpButton">Sign up</button><button type="button" id="signOutButton" hidden>Sign out</button></div>
        </form>
        <p class="action-message" id="authMessage" role="status"></p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data-source.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
